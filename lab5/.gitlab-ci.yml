# CI/CD Pipeline для тестирования, сборки и публикации приложения

# Определение переменных окружения
variables:
  # Docker образ
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE
  DOCKER_TAG: $CI_COMMIT_REF_SLUG
  # Python версия
  PYTHON_VERSION: "3.11"
  # Директория для кэша pip
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# Определение стадий pipeline
stages:
  - test
  - build
  - publish
  - deploy

# Кэширование для ускорения сборки
cache:
  paths:
    - .cache/pip
    - venv/

# Перед выполнением всех job
before_script:
  - echo "Starting CI/CD Pipeline for commit $CI_COMMIT_SHORT_SHA"

# ==== СТАДИЯ 1: ТЕСТИРОВАНИЕ ====

# Unit тесты с покрытием кода
unit-tests:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - echo "Running unit tests..."
    - pytest tests/ --cov=src --cov-report=term-missing --cov-report=xml --cov-report=html -v
    - echo "Code coverage report generated"
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - htmlcov/
      - coverage.xml
    expire_in: 30 days
  only:
    - branches
    - merge_requests
    - tags

# Проверка качества кода (опционально)
code-quality:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - pip install --upgrade pip
    - pip install pylint flake8
  script:
    - echo "Running code quality checks..."
    - flake8 src/ --max-line-length=100 --statistics || true
    - pylint src/ --max-line-length=100 || true
  allow_failure: true
  only:
    - branches
    - merge_requests

# ==== СТАДИЯ 2: СБОРКА ====

# Сборка Docker образа
build-docker:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker info
    - echo "Building Docker image..."
  script:
    # Сборка образа с использованием кэша
    - docker build 
      --cache-from $DOCKER_IMAGE:latest 
      --tag $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA 
      --tag $DOCKER_IMAGE:$DOCKER_TAG 
      --file Dockerfile .
    # Проверка работоспособности образа
    - docker run --rm $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA python -m src.main
    # Сохранение образа в tar для передачи между стадиями
    - docker save $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA -o image.tar
  artifacts:
    paths:
      - image.tar
    expire_in: 1 day
  only:
    - branches
    - tags
  needs:
    - unit-tests

# Проверка безопасности образа (опционально)
security-scan:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - apk add --no-cache curl
  script:
    - docker load -i image.tar
    - echo "Security scan would run here (e.g., Trivy, Clair)"
    - docker inspect $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA
  dependencies:
    - build-docker
  allow_failure: true
  only:
    - branches
    - tags

# ==== СТАДИЯ 3: ПУБЛИКАЦИЯ ====

# Публикация в GitLab Container Registry
publish-gitlab:
  stage: publish
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    # Авторизация в GitLab Container Registry
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # Загрузка образа из артефакта
    - docker load -i image.tar
    # Тегирование образа
    - docker tag $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA $DOCKER_IMAGE:latest
    - docker tag $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA $DOCKER_IMAGE:$DOCKER_TAG
    # Публикация образа
    - docker push $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $DOCKER_IMAGE:$DOCKER_TAG
    - docker push $DOCKER_IMAGE:latest
    - echo "Docker image published to $CI_REGISTRY_IMAGE"
  dependencies:
    - build-docker
  only:
    - main
    - master
    - tags
  needs:
    - build-docker
    - unit-tests

# Публикация релиза с тегами
publish-release:
  stage: publish
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker load -i image.tar
    - docker tag $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA $DOCKER_IMAGE:$CI_COMMIT_TAG
    - docker push $DOCKER_IMAGE:$CI_COMMIT_TAG
    - echo "Release $CI_COMMIT_TAG published"
  dependencies:
    - build-docker
  only:
    - tags
  except:
    - branches

# ==== СТАДИЯ 4: ДЕПЛОЙ (опционально) ====

# Деплой на staging окружение
deploy-staging:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Deploying to staging environment..."
    - echo "Image: $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA"
    - echo "This is where deployment commands would go"
    - echo "For example: kubectl, docker-compose, etc."
  environment:
    name: staging
    url: https://staging.example.com
  only:
    - develop
  needs:
    - publish-gitlab
  when: manual

# Деплой на production окружение
deploy-production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Deploying to production environment..."
    - echo "Image: $DOCKER_IMAGE:$CI_COMMIT_TAG"
    - echo "Production deployment commands"
  environment:
    name: production
    url: https://production.example.com
  only:
    - tags
  needs:
    - publish-release
  when: manual

# ==== ОБРАБОТКА ОШИБОК ====

# Job для очистки при ошибке
cleanup-on-failure:
  stage: .post
  script:
    - echo "Pipeline failed, cleaning up..."
    - rm -f image.tar
  when: on_failure
  allow_failure: true
