# Для продакшена замените пароль на сильный и не храните его в Git (Sealed Secrets / CI).
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  labels:
    app: postgres
type: Opaque
stringData:
  postgres-password: REPLACE_WITH_SECRET_FROM_CI
  username: postgres
  database: support_bot
