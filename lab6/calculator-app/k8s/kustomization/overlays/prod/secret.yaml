apiVersion: v1
kind: Secret
metadata:
  name: calculator-secret
  labels:
    app: calculator
type: Opaque
stringData:
  # Не храните реальные значения в Git — подставляйте через CI/CD
  API_KEY: REPLACE_WITH_SECRET_FROM_CI
  # FQDN — БД в telegram-demo, приложение в calculator-prod (меж-namespace контракт)
  DATABASE_URL: "postgres://postgres:REPLACE_WITH_SECRET_FROM_CI@postgres-0.postgres.telegram-demo.svc.cluster.local:5432/support_bot?sslmode=disable"
